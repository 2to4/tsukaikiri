<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>つかいきり — オンボーディング（Android スマホ）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; } html, body { margin: 0; padding: 0; background: #E9E6E0; }
  body { font-family: 'M PLUS Rounded 1c', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  button, input { font-family: inherit; } ::-webkit-scrollbar { display: none; }
  @keyframes slpop { 0% { transform:scale(0.6); opacity:0; } 60% { transform:scale(1.08); } 100% { transform:scale(1); opacity:1; } }
  .sl-pop { animation: slpop 0.5s cubic-bezier(.2,.9,.3,1.2) forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="androidPlatform.jsx"></script>
<script type="text/babel" src="androidOnboarding.jsx"></script>
<script type="text/babel">
const { T } = window;
const { Welcome, AIStep, ListSelectStep, ApplianceStep } = window.Onboarding;
const { LinkStepAndroid, FinishAndroid } = window.AndroidOnboarding;
const { AndroidPageHeader, AndroidSeg, PAGE_BG } = window.AndroidPlatform;
const TOTAL = 6;
const opts = [['s0','1 ようこそ'],['s1','2 AI'],['s2','3 連携'],['s3','4 リスト'],['s4','5 家電'],['s5','6 完了']];
function App() {
  const [i, setI] = React.useState(0);
  const [toast, setToast] = React.useState(null);
  const toastT = React.useRef(null);
  const showToast = (m) => { setToast(m); clearTimeout(toastT.current); toastT.current = setTimeout(() => setToast(null), 1800); };
  const next = () => setI((v) => Math.min(TOTAL-1, v+1));
  const back = i > 0 ? () => setI((v) => Math.max(0, v-1)) : null;
  const skip = () => { showToast('スキップしました（あとで設定できます）'); next(); };
  let screen;
  if (i===0) screen = <Welcome onNext={next} />;
  else if (i===1) screen = <AIStep step={1} total={TOTAL} onBack={back} onNext={next} onSkip={skip} />;
  else if (i===2) screen = <LinkStepAndroid step={2} total={TOTAL} onBack={back} onNext={next} onSkip={skip} />;
  else if (i===3) screen = <ListSelectStep step={3} total={TOTAL} onBack={back} onNext={next} onSkip={skip} />;
  else if (i===4) screen = <ApplianceStep step={4} total={TOTAL} onBack={back} onNext={next} onSkip={skip} />;
  else screen = <FinishAndroid onStart={() => showToast('在庫画面へ移動します')} />;
  return (
    <div style={{ minHeight:'100vh', background:PAGE_BG, fontFamily:T.font, color:T.ink, display:'flex', flexDirection:'column', alignItems:'center' }}>
      <AndroidPageHeader title="オンボーディング・スマホ（Android）" subtitle="6ステップ・Google サインイン連携" right={<AndroidSeg value={`s${i}`} onChange={(v) => setI(parseInt(v[1]))} opts={opts} />} />
      <div style={{ padding:'40px 20px 64px' }}>
        <window.AndroidDevice width={412} height={892}>
          <div style={{ position:'relative', height:'100%' }}>
            {screen}
            {toast && <div style={{ position:'absolute', left:'50%', bottom:110, transform:'translateX(-50%)', zIndex:90, background:'rgba(42,39,35,0.94)', color:'#fff', padding:'12px 22px', borderRadius:999, fontFamily:T.font, fontSize:13.5, fontWeight:700, whiteSpace:'nowrap' }}>{toast}</div>}
          </div>
        </window.AndroidDevice>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
