<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>つかいきり — 買い物リスト確認（Android スマホ）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; } html, body { margin: 0; padding: 0; background: #E9E6E0; }
  body { font-family: 'M PLUS Rounded 1c', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; } ::-webkit-scrollbar { display: none; }
  @keyframes campulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); opacity:0.82; } }
  .cam-pulse { animation: campulse 1.5s ease-in-out infinite; }
  @keyframes cambar { 0% { width:8%; } 60% { width:82%; } 100% { width:97%; } }
  .cam-bar { animation: cambar 1.6s ease-in-out forwards; }
  @keyframes slpop { 0% { transform:scale(0.6); opacity:0; } 60% { transform:scale(1.08); } 100% { transform:scale(1); opacity:1; } }
  .sl-pop { animation: slpop 0.5s cubic-bezier(.2,.9,.3,1.2) forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="shoppingPhone.jsx"></script>
<script type="text/babel" src="androidPlatform.jsx"></script>
<script type="text/babel">
const { T } = window;
/* androidPlatform.jsx has already patched ShoppingPhone.DEST.app = 'Google ToDo' */
const { SHOP_SEED, ListScreen, AddingScreen, DoneScreen, ShopError } = window.ShoppingPhone;
const { AndroidPageHeader, AndroidSeg, PAGE_BG } = window.AndroidPlatform;
const clone = (a) => a.map((x) => ({ ...x }));
const opts = [['normal','通常'],['adding','追加中'],['done','完了'],['error','エラー']];
function App() {
  const [step, setStep] = React.useState('normal');
  const [items, setItems] = React.useState(clone(SHOP_SEED));
  const [list, setList] = React.useState('買い物');
  const timer = React.useRef(null);
  const chosenItems = items.filter((i) => i.checked);
  const startAdd = () => { setStep('adding'); clearTimeout(timer.current); timer.current = setTimeout(() => setStep('done'), 1700); };
  const jump = (s) => { clearTimeout(timer.current); if (s==='normal') setItems(clone(SHOP_SEED)); setStep(s); };
  let screen;
  if (step==='normal') screen = <ListScreen items={items} setItems={setItems} list={list} setList={setList} onAdd={startAdd} onBack={() => {}} />;
  else if (step==='adding') screen = <AddingScreen list={list} count={chosenItems.length||items.length} />;
  else if (step==='done') screen = <DoneScreen list={list} items={chosenItems.length?chosenItems:items} onOpen={() => {}} onBack={() => jump('normal')} />;
  else screen = <ShopError onRetry={startAdd} onBack={() => jump('normal')} />;
  return (
    <div style={{ minHeight:'100vh', background:PAGE_BG, fontFamily:T.font, color:T.ink, display:'flex', flexDirection:'column', alignItems:'center' }}>
      <AndroidPageHeader title="買い物リスト確認・スマホ（Android）" subtitle="不足食材を選び、Google ToDo のリストに追加" right={<AndroidSeg value={step} onChange={jump} opts={opts} />} />
      <div style={{ padding:'40px 20px 64px' }}><window.AndroidDevice width={412} height={892}>{screen}</window.AndroidDevice></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
