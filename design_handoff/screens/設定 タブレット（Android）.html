<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>つかいきり — 設定画面（Android タブレット）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
<style>* { box-sizing:border-box; } html,body { margin:0; padding:0; background:#E9E6E0; } body { font-family:'M PLUS Rounded 1c',system-ui,sans-serif; -webkit-font-smoothing:antialiased; } button,input { font-family:inherit; } ::-webkit-scrollbar { display:none; }</style>
</head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="settingsTablet.jsx"></script>
<script type="text/babel" src="helpAbout.jsx"></script>
<script type="text/babel" src="androidPlatform.jsx"></script>
<script type="text/babel" src="androidSettings.jsx"></script>
<script type="text/babel">
const { T, Icon } = window;
const { GeneralPane, AIPane, AppliancePane, SupportPane } = window.SettingsTablet;
const { ListPaneAndroid, DataPaneAndroid } = window.SettingsAndroid;
const { AI_PROVIDERS } = window.Settings;
const { AndroidTabletFrame, AndroidPageHeader, AndroidSeg, useFitAndroid, ATW, ATH, PAGE_BG } = window.AndroidPlatform;
const ANAV = [
  { k:'general',   icon:'globe',   label:'一般',                     sub:'言語' },
  { k:'ai',        icon:'spark',   label:'AI（食材認識・献立提案）', sub:'プロバイダ・APIキー' },
  { k:'list',      icon:'list',    label:'買い物リスト連携',          sub:'Google ToDo' },
  { k:'appliance', icon:'pot',     label:'調理家電',                  sub:'ホットクック ほか' },
  { k:'data',      icon:'cloud',   label:'データ',                    sub:'Google Drive 同期' },
  { k:'support',   icon:'coffee',  label:'サポート',                  sub:'応援・ヘルプ・情報' },
];
const opts = [['normal','通常（登録済み）'],['nokey','APIキー未登録']];
function App() {
  const [state, setState] = React.useState('normal');
  const [nav, setNav] = React.useState('ai');
  const [lang, setLang] = React.useState('日本語');
  const [ai, setAi] = React.useState('claude');
  const [keys, setKeys] = React.useState({ claude:'sk-ant-a1b2c3d4e5f6', openai:'', gemini:'', grok:'' });
  const [list, setList] = React.useState('買い物');
  const [sync, setSync] = React.useState(true);
  const scale = useFitAndroid(ATW, ATH);
  const effKeys = state==='nokey' ? { claude:'', openai:'', gemini:'', grok:'' } : keys;
  const setEffKeys = state==='nokey' ? () => {} : setKeys;
  let pane;
  if(nav==='general') pane=<GeneralPane lang={lang} setLang={setLang} />;
  else if(nav==='ai') pane=<AIPane state={state} ai={ai} setAi={setAi} keys={effKeys} setKeys={setEffKeys} />;
  else if(nav==='list') pane=<ListPaneAndroid list={list} setList={setList} />;
  else if(nav==='appliance') pane=<AppliancePane />;
  else if(nav==='data') pane=<DataPaneAndroid sync={sync} setSync={setSync} lastSync="今日 8:24" />;
  else pane=<SupportPane />;
  return (
    <div style={{ minHeight:'100vh', background:PAGE_BG, fontFamily:T.font, color:T.ink }}>
      <AndroidPageHeader title="設定・Android タブレット横向き" subtitle="左=設定セクション ／ 右=選択セクションの内容（Google ToDo / Google Drive）" right={<AndroidSeg value={state} onChange={(v) => setState(v)} opts={opts} />} />
      <div style={{ display:'flex', justifyContent:'center', padding:'40px 0 60px' }}>
        <div style={{ width:ATW*scale, height:ATH*scale }}>
          <div style={{ transform:`scale(${scale})`, transformOrigin:'top center', width:ATW, marginLeft:(ATW*scale-ATW)/2 }}>
            <AndroidTabletFrame>
              <div style={{ height:'100%', display:'flex', fontFamily:T.font }}>
                <div style={{ width:372, flexShrink:0, borderRight:`1px solid ${T.line}`, background:'#FBFAF7', display:'flex', flexDirection:'column' }}>
                  <div style={{ padding:'34px 24px 14px' }}><div style={{ fontFamily:T.brand, fontSize:27, fontWeight:700, color:T.ink }}>設定</div></div>
                  <div style={{ flex:1, overflow:'auto', padding:'4px 14px' }}>
                    {ANAV.map((n) => { const on=nav===n.k;
                      return (
                        <button key={n.k} onClick={() => setNav(n.k)} style={{ width:'100%', border:'none', cursor:'pointer', display:'flex', alignItems:'center', gap:13, padding:'13px 14px', borderRadius:14, marginBottom:4, background: on?T.greenSoft:'transparent', textAlign:'left' }}>
                          <div style={{ width:38, height:38, borderRadius:11, background: on?'#fff':'#F1EEE7', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><Icon name={n.icon} size={20} color={on?T.green:T.sub} stroke={2} /></div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:15, fontWeight:800, color: on?T.greenInk:T.ink, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{n.label}</div>
                            <div style={{ fontSize:11.5, fontWeight:600, color:T.sub, marginTop:1 }}>{n.sub}</div>
                          </div>
                          <Icon name="chevron" size={16} color={on?T.green:T.faint} stroke={2.2} />
                        </button>
                      );
                    })}
                  </div>
                  <div style={{ padding:'12px 24px 18px', fontSize:11, fontWeight:600, color:T.faint }}>つかいきり ・v1.0.0 (128)</div>
                </div>
                <div style={{ flex:1, background:T.bg }}>{pane}</div>
              </div>
            </AndroidTabletFrame>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
