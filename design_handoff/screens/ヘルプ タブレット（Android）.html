<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>つかいきり — ヘルプ・このアプリについて（Android タブレット）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
<style>* { box-sizing:border-box; } html,body { margin:0; padding:0; background:#E9E6E0; } body { font-family:'M PLUS Rounded 1c',system-ui,sans-serif; -webkit-font-smoothing:antialiased; } button { font-family:inherit; } ::-webkit-scrollbar { display:none; }</style>
</head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="helpAbout.jsx"></script>
<script type="text/babel" src="helpTablet.jsx"></script>
<script type="text/babel" src="androidPlatform.jsx"></script>
<script type="text/babel">
const { T } = window;
const { HelpTablet } = window.HelpTablet;
const { AndroidTabletFrame, AndroidPageHeader, useFitAndroid, ATW, ATH, PAGE_BG } = window.AndroidPlatform;
function App() {
  const scale = useFitAndroid(ATW, ATH);
  return (
    <div style={{ minHeight:'100vh', background:PAGE_BG, fontFamily:T.font, color:T.ink }}>
      <AndroidPageHeader title="ヘルプ・このアプリについて・Android タブレット" subtitle="左=目次 ／ 右=本文（スクロールで現在地が連動）" />
      <div style={{ display:'flex', justifyContent:'center', padding:'40px 0 60px' }}>
        <div style={{ width:ATW*scale, height:ATH*scale }}>
          <div style={{ transform:`scale(${scale})`, transformOrigin:'top center', width:ATW, marginLeft:(ATW*scale-ATW)/2 }}>
            <AndroidTabletFrame><HelpTablet /></AndroidTabletFrame>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
